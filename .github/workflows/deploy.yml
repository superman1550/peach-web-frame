name: Publish to Maven Central
on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0, v2.1.3 等标签时触发

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'JDK 1.8 / Java SE 8 (LTS)'
          # 关键：配置 Maven settings，用于认证和中央仓库部署
          server-id: central # 必须与 pom.xml 中的 repository id 匹配
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          # 导入 GPG 私钥
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Build and Deploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # 移除版本号前的 'v' 前缀 (例如 v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF_NAME#v}
          # 设置 Maven 版本并部署，激活 central profile
          mvn versions:set -DnewVersion=$VERSION
          mvn clean deploy -P central -Dgpg.passphrase=${{ secrets.GPG_PASSPHRASE }} --no-transfer-progress